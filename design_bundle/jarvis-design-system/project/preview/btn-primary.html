<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_base.css">
<style>
  .btn {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 10px 20px;
    border: 1px solid var(--primary);
    background: rgba(0,212,255,0.08);
    color: var(--primary);
    cursor: pointer;
    position: relative;
    /* corner notches */
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
  }
  .btn-primary {
    background: var(--primary);
    color: var(--fg-on-primary);
    box-shadow: var(--glow-sm);
  }
  .btn-accent {
    border-color: var(--accent);
    background: rgba(255,107,53,0.1);
    color: var(--accent);
  }
  .btn-accent-fill {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--fg-on-accent);
    box-shadow: var(--glow-accent);
  }
  .btn-danger {
    border-color: var(--danger);
    background: rgba(255,42,77,0.12);
    color: var(--danger);
  }
  .btn-ghost {
    border-color: var(--border-1);
    background: transparent;
    color: var(--fg-2);
  }
</style></head>
<body><div class="card-frame col" style="gap:14px;">
  <div class="row" style="gap:10px; flex-wrap:wrap;">
    <button class="btn btn-primary">▸ ENGAGE</button>
    <button class="btn">▸ SCAN</button>
    <button class="btn btn-ghost">CANCEL</button>
  </div>
  <div class="row" style="gap:10px; flex-wrap:wrap;">
    <button class="btn btn-accent-fill">⚠ OVERRIDE</button>
    <button class="btn btn-accent">▸ DEPLOY</button>
    <button class="btn btn-danger">■ SHUTDOWN</button>
  </div>
  <div class="label-row">Buttons are clipped at corners (8px notch). Primary glows; ghost has hairline only.</div>
</div></body></html>
