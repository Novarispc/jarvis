<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>Primary palette</title>
<link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame col" style="gap:14px">
  <div class="row">
    <div class="swatch" style="background:var(--primary);"><span class="name">PRIMARY</span><span class="hex">#00d4ff</span></div>
    <div class="swatch" style="background:var(--primary-soft);"><span class="name">SOFT</span><span class="hex">#5fe3ff</span></div>
    <div class="swatch dark" style="background:var(--primary-deep);"><span class="name">DEEP</span><span class="hex">#0086a8</span></div>
    <div class="swatch dark" style="background:rgba(0,212,255,0.15);border-color:var(--primary);"><span class="name">PRIMARY/15</span><span class="hex">tint</span></div>
  </div>
  <div class="row">
    <div class="swatch" style="background:var(--accent);"><span class="name">ACCENT</span><span class="hex">#ff6b35</span></div>
    <div class="swatch" style="background:var(--accent-soft);"><span class="name">SOFT</span><span class="hex">#ffb37a</span></div>
    <div class="swatch dark" style="background:var(--accent-deep);"><span class="name">DEEP</span><span class="hex">#c4441b</span></div>
    <div class="swatch dark" style="background:rgba(255,107,53,0.18);border-color:var(--accent);"><span class="name">ACCENT/18</span><span class="hex">tint</span></div>
  </div>
  <div class="label-row" style="margin-top:6px">Cyan signal + orange warning. Same pair as the reference HUD.</div>
</div>
</body></html>
