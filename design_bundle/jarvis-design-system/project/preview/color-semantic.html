<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame col" style="gap:10px">
  <div class="row" style="gap:8px;">
    <div class="swatch dark" style="background:var(--success); color:#001a10; flex:1;"><span class="name">SUCCESS · ONLINE</span><span class="hex">#00ff9c</span></div>
    <div class="swatch dark" style="background:var(--warning); color:#1a1000; flex:1;"><span class="name">WARNING · ALERT</span><span class="hex">#ffb800</span></div>
    <div class="swatch" style="background:var(--danger); flex:1;"><span class="name">DANGER · CRITICAL</span><span class="hex">#ff2a4d</span></div>
  </div>
  <div class="row" style="gap:8px; margin-top:4px;">
    <div style="flex:1; padding:8px 12px; border:1px solid var(--success); background:rgba(0,255,156,0.08); color:var(--success); font-family:var(--font-mono); font-size:11px; letter-spacing:0.18em;">▸ SYSTEM ONLINE</div>
    <div style="flex:1; padding:8px 12px; border:1px solid var(--warning); background:rgba(255,184,0,0.08); color:var(--warning); font-family:var(--font-mono); font-size:11px; letter-spacing:0.18em;">▲ TEMP RISING</div>
    <div style="flex:1; padding:8px 12px; border:1px solid var(--danger); background:rgba(255,42,77,0.12); color:var(--danger); font-family:var(--font-mono); font-size:11px; letter-spacing:0.18em;">⚠ REACTOR LOW</div>
  </div>
  <div class="label-row" style="margin-top:6px">Status feedback uses tinted bg + 1px stroke in the status hue. Red = chest reactor.</div>
</div>
</body></html>
