<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>Surfaces & borders</title>
<link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame col" style="gap:14px">
  <div class="row" style="gap:0">
    <div class="swatch dark" style="background:var(--void); flex:1; height:80px;"><span class="name">VOID</span><span class="hex">#000408</span></div>
    <div class="swatch dark" style="background:var(--surface-0); flex:1; height:80px;"><span class="name">SURFACE-0</span><span class="hex">#050b14</span></div>
    <div class="swatch dark" style="background:var(--surface-1); flex:1; height:80px;"><span class="name">SURFACE-1</span><span class="hex">#0a1622</span></div>
    <div class="swatch dark" style="background:var(--surface-2); flex:1; height:80px;"><span class="name">SURFACE-2</span><span class="hex">#11253a</span></div>
  </div>
  <div class="row" style="gap:8px;align-items:stretch;">
    <div style="flex:1; height:60px; background:var(--surface-1); border:1px solid var(--border-1); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:10px; color:var(--fg-3); letter-spacing:0.18em;">BORDER-1 · 18%</div>
    <div style="flex:1; height:60px; background:var(--surface-1); border:1px solid var(--border-2); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:10px; color:var(--fg-2); letter-spacing:0.18em;">BORDER-2 · 35%</div>
    <div style="flex:1; height:60px; background:var(--surface-1); border:1px solid var(--border-strong); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:10px; color:var(--primary); letter-spacing:0.18em;">STRONG · 60%</div>
  </div>
  <div class="label-row">All surfaces are dark. Hierarchy comes from hairlines + glow, not fills.</div>
</div>
</body></html>
