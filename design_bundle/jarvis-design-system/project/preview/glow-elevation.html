<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>Glow & elevation</title>
<link rel="stylesheet" href="_base.css">
<style>
  .glow-box {
    flex:1;
    height: 96px;
    background: var(--surface-1);
    border: 1px solid var(--border-strong);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.22em;
    color:var(--primary);
  }
</style></head>
<body><div class="card-frame col" style="gap:14px;">
  <div class="row" style="gap:20px;">
    <div class="glow-box" style="box-shadow: var(--glow-sm);">GLOW-SM</div>
    <div class="glow-box" style="box-shadow: var(--glow-md);">GLOW-MD</div>
    <div class="glow-box" style="box-shadow: var(--glow-lg);">GLOW-LG</div>
  </div>
  <div class="row" style="gap:20px;">
    <div class="glow-box" style="border-color:var(--accent); color:var(--accent); box-shadow: var(--glow-accent);">GLOW-ACCENT</div>
    <div class="glow-box" style="border-color:var(--danger); color:var(--danger); box-shadow: var(--glow-danger);">GLOW-DANGER</div>
    <div class="glow-box" style="border-color:var(--border-1); color:var(--fg-3); box-shadow:none;">FLAT (NO GLOW)</div>
  </div>
  <div class="label-row">Elevation = outer glow + 1px stroke. Drop-shadows are forbidden.</div>
</div></body></html>
