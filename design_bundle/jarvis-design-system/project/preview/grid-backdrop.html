<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>HUD grid backdrop</title>
<link rel="stylesheet" href="_base.css"></head>
<body style="padding:0;">
<div style="height:280px; width:100%; background:var(--void); background-image: var(--bg-grid); position:relative;">
  <div style="position:absolute; inset:16px; border:1px solid var(--border-strong); pointer-events:none;"></div>
  <div style="position:absolute; left:16px; top:16px; right:16px; height:0; border-top:1px solid var(--border-strong);"></div>
  <!-- corner brackets -->
  <div style="position:absolute; left:12px; top:12px; width:18px; height:18px; border-left:2px solid var(--primary); border-top:2px solid var(--primary);"></div>
  <div style="position:absolute; right:12px; top:12px; width:18px; height:18px; border-right:2px solid var(--primary); border-top:2px solid var(--primary);"></div>
  <div style="position:absolute; left:12px; bottom:12px; width:18px; height:18px; border-left:2px solid var(--primary); border-bottom:2px solid var(--primary);"></div>
  <div style="position:absolute; right:12px; bottom:12px; width:18px; height:18px; border-right:2px solid var(--primary); border-bottom:2px solid var(--primary);"></div>
  <!-- centered label -->
  <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center;">
      <div style="font-family:var(--font-display); font-weight:900; font-size:30px; letter-spacing:0.32em; color:var(--primary); text-shadow:var(--glow-sm);">HUD GRID</div>
      <div class="micro" style="margin-top:8px;">32px FINE · 128px BOLD · CORNER BRACKETS · HAIRLINE FRAME</div>
    </div>
  </div>
</div>
</body></html>
