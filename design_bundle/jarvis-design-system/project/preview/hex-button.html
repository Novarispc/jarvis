<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>Hex buttons</title>
<link rel="stylesheet" href="_base.css">
<style>
  .hex {
    width: 78px;
    height: 90px;
    position: relative;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--primary);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.04em;
  }
  .hex::before {
    content:'';
    position:absolute;
    inset:0;
    background: var(--surface-1);
    border: 1px solid var(--primary);
    clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
    box-shadow: var(--glow-sm);
  }
  .hex > * { position:relative; z-index:1; }
  .hex.solid::before { background: var(--primary); }
  .hex.solid { color: var(--fg-on-primary); }
  .hex.accent::before { background: var(--accent); border-color: var(--accent); box-shadow: var(--glow-accent); }
  .hex.accent { color: var(--fg-on-accent); }
  .hex.muted::before { background: transparent; border-color: var(--border-1); box-shadow:none; }
  .hex.muted { color: var(--fg-3); }
</style></head>
<body><div class="card-frame col" style="gap:10px;">
  <div class="row" style="gap:14px;">
    <div class="hex solid">A</div>
    <div class="hex"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="6" width="18" height="12" rx="2"/><line x1="8" y1="10" x2="8" y2="10"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="16" y1="10" x2="16" y2="10"/></svg></div>
    <div class="hex"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M3 12 H21 M12 3 C16 7 16 17 12 21 C8 17 8 7 12 3"/></svg></div>
    <div class="hex accent"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2 L4 7 L4 17 L12 22 L20 17 L20 7 Z"/><circle cx="12" cy="12" r="3"/></svg></div>
    <div class="hex muted">+</div>
  </div>
  <div class="label-row">Hex-cell launcher tiles. Used in compact app grids in the reference HUD.</div>
</div></body></html>
