<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="_base.css">
<style>
  .icon-grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 14px; }
  .ic {
    aspect-ratio: 1 / 1;
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--primary);
    border: 1px solid var(--border-1);
    background: var(--surface-1);
  }
  .ic svg { width:60%; height:60%; }
  .ic.glow { box-shadow: var(--glow-sm); border-color: var(--primary); }
  .ic.accent { color: var(--accent); border-color: var(--accent); box-shadow: var(--glow-accent); }
</style></head>
<body><div class="card-frame col" style="gap:10px;">
  <div class="icon-grid">
    <!-- All icons use 1.5px stroke + lucide-style line. Drawn from Lucide via CDN below -->

</div></body></html>
