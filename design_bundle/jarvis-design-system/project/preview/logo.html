<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>Wordmark · J.A.R.V.I.S.</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { display:flex; align-items:center; justify-content:center; }
  .lockup {
    display:flex;
    align-items:center;
    gap: 22px;
  }
  .reactor {
    width: 100px;
    height: 100px;
    position: relative;
  }
  .reactor svg { width:100%; height:100%; display:block; }
  .ring { fill:none; stroke: var(--primary); }
  .wm {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 48px;
    letter-spacing: 0.28em;
    color: var(--primary);
    text-shadow: var(--glow-sm);
    line-height: 1;
  }
  .sub {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.42em;
    color: var(--fg-3);
    margin-top: 6px;
  }
</style></head>
<body><div class="lockup">
  <div class="reactor">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="48" class="ring" stroke-width="1"/>
      <circle cx="50" cy="50" r="42" class="ring" stroke-width="2"/>
      <circle cx="50" cy="50" r="34" class="ring" stroke-width="1" opacity="0.5"/>
      <circle cx="50" cy="50" r="22" class="ring" stroke-width="1"/>
      <circle cx="50" cy="50" r="14" fill="var(--primary)" opacity="0.2"/>
      <circle cx="50" cy="50" r="14" class="ring" stroke-width="2"/>
      <circle cx="50" cy="50" r="5" fill="var(--primary)" style="filter: drop-shadow(0 0 6px var(--primary));"/>
      <!-- internal star polygon (triskelion-like) -->
      <g stroke="var(--primary)" stroke-width="1" fill="none" opacity="0.7">
        <path d="M50 36 L 60 50 L 50 64 L 40 50 Z"/>
        <line x1="50" y1="22" x2="50" y2="36"/>
        <line x1="50" y1="64" x2="50" y2="78"/>
        <line x1="22" y1="50" x2="40" y2="50"/>
        <line x1="60" y1="50" x2="78" y2="50"/>
      </g>
    </svg>
  </div>
  <div>
    <div class="wm">JARVIS</div>
    <div class="sub">JUST·A·RATHER·VERY·INTELLIGENT·SYSTEM</div>
  </div>
</div></body></html>
