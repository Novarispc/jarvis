<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>Panel chrome</title>
<link rel="stylesheet" href="_base.css">
<style>
  .panel {
    background: rgba(10, 22, 34, 0.85);
    border: 1px solid var(--border-2);
    padding: 14px;
    position: relative;
  }
  .panel::before, .panel::after {
    content:'';
    position:absolute;
    width:14px; height:14px;
    border-color: var(--primary);
    border-style: solid;
  }
  .panel::before { top:-1px; left:-1px; border-width: 2px 0 0 2px; }
  .panel::after  { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }
  .panel-head {
    display:flex; align-items:center; gap:10px;
    border-bottom: 1px solid var(--border-1);
    padding-bottom: 8px;
    margin-bottom: 10px;
  }
  .panel-dot {
    width:8px; height:8px; background: var(--primary);
    box-shadow: var(--glow-sm);
  }
  .panel-title {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--fg-1);
  }
  .panel-tag {
    margin-left:auto;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
  }
</style></head>
<body><div class="card-frame col" style="gap:12px;">
  <div class="panel">
    <div class="panel-head">
      <div class="panel-dot"></div>
      <div class="panel-title">SYSTEM TELEMETRY</div>
      <div class="panel-tag">LIVE</div>
    </div>
    <div class="row" style="gap:24px; font-family:var(--font-mono); font-size:12px; color:var(--fg-2);">
      <div><div class="micro" style="margin-bottom:2px;">CPU</div><span style="color:var(--primary); font-size:18px;">33%</span></div>
      <div><div class="micro" style="margin-bottom:2px;">RAM</div><span style="color:var(--primary); font-size:18px;">63%</span></div>
      <div><div class="micro" style="margin-bottom:2px;">UPTIME</div><span style="color:var(--primary); font-size:18px;">0d 20h</span></div>
      <div><div class="micro" style="margin-bottom:2px;">CORE</div><span style="color:var(--accent); font-size:18px;">54°C</span></div>
    </div>
  </div>
  <div class="label-row">Panels: dark fill at 85% over grid, 1px stroke, corner brackets at TL+BR, dot+title head.</div>
</div></body></html>
