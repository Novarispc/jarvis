<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  .sp-row { display:flex; align-items:center; gap:14px; }
  .sp-bar { background: var(--primary); height: 16px; box-shadow: var(--glow-sm); }
  .sp-tag { font-family:var(--font-mono); font-size:10px; letter-spacing:0.18em; color:var(--fg-3); min-width:70px; }
</style></head>
<body><div class="card-frame col" style="gap:6px">
  <div class="sp-row"><div class="sp-tag">SPACE-1</div><div class="sp-bar" style="width:4px;"></div><div class="micro">4</div></div>
  <div class="sp-row"><div class="sp-tag">SPACE-2</div><div class="sp-bar" style="width:8px;"></div><div class="micro">8</div></div>
  <div class="sp-row"><div class="sp-tag">SPACE-3</div><div class="sp-bar" style="width:12px;"></div><div class="micro">12</div></div>
  <div class="sp-row"><div class="sp-tag">SPACE-4</div><div class="sp-bar" style="width:16px;"></div><div class="micro">16</div></div>
  <div class="sp-row"><div class="sp-tag">SPACE-5</div><div class="sp-bar" style="width:24px;"></div><div class="micro">24</div></div>
  <div class="sp-row"><div class="sp-tag">SPACE-6</div><div class="sp-bar" style="width:32px;"></div><div class="micro">32</div></div>
  <div class="sp-row"><div class="sp-tag">SPACE-7</div><div class="sp-bar" style="width:48px;"></div><div class="micro">48</div></div>
  <div class="sp-row"><div class="sp-tag">SPACE-8</div><div class="sp-bar" style="width:64px;"></div><div class="micro">64</div></div>
</div></body></html>
