<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame col" style="gap:10px">
  <div style="font-family:var(--font-display); font-weight:900; font-size:56px; letter-spacing:0.32em; color:var(--primary); text-shadow:var(--glow-sm); line-height:1;">JARVIS</div>
  <div class="row" style="gap:8px; align-items:baseline;">
    <div style="font-family:var(--font-display); font-weight:600; font-size:24px; letter-spacing:0.18em; text-transform:uppercase; color:var(--fg-1);">SYSTEM ONLINE</div>
    <div class="micro" style="color:var(--fg-3); margin-left:auto;">Orbitron / 600</div>
  </div>
  <div class="row" style="gap:8px; align-items:baseline;">
    <div style="font-family:var(--font-display); font-weight:500; font-size:18px; letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-1);">Diagnostic readout</div>
    <div class="micro" style="color:var(--fg-3); margin-left:auto;">Orbitron / 500</div>
  </div>
  <div class="label-row">Orbitron — display + wordmarks. Tracked wide. Uppercase by default.</div>
</div>
</body></html>
