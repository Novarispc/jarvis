<!doctype html>
<html data-theme="jarvis"><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card-frame col" style="gap:6px">
  <div class="row" style="align-items:baseline; gap:14px;">
    <div style="font-family:var(--font-display); font-weight:900; font-size:48px; letter-spacing:0.18em; color:var(--primary); line-height:1;">Aa</div>
    <div style="flex:1; border-bottom:1px dashed var(--border-1); padding-bottom:6px;"><div class="micro">HUD-XL · 72 · Orbitron 900</div></div>
  </div>
  <div class="row" style="align-items:baseline; gap:14px;">
    <div style="font-family:var(--font-display); font-weight:700; font-size:32px; letter-spacing:0.18em; color:var(--fg-1); line-height:1;">Aa</div>
    <div style="flex:1; border-bottom:1px dashed var(--border-1); padding-bottom:6px;"><div class="micro">H1 · 32 · Orbitron 700</div></div>
  </div>
  <div class="row" style="align-items:baseline; gap:14px;">
    <div style="font-family:var(--font-display); font-weight:600; font-size:24px; letter-spacing:0.18em; color:var(--fg-1); line-height:1;">Aa</div>
    <div style="flex:1; border-bottom:1px dashed var(--border-1); padding-bottom:6px;"><div class="micro">H2 · 24 · Orbitron 600</div></div>
  </div>
  <div class="row" style="align-items:baseline; gap:14px;">
    <div style="font-family:var(--font-body); font-weight:500; font-size:15px; color:var(--fg-1); line-height:1;">Aa body</div>
    <div style="flex:1; border-bottom:1px dashed var(--border-1); padding-bottom:6px;"><div class="micro">BODY · 15 · Rajdhani 500</div></div>
  </div>
  <div class="row" style="align-items:baseline; gap:14px;">
    <div style="font-family:var(--font-body); font-weight:600; font-size:12px; letter-spacing:0.32em; color:var(--fg-3); text-transform:uppercase; line-height:1;">LABEL</div>
    <div style="flex:1; border-bottom:1px dashed var(--border-1); padding-bottom:6px;"><div class="micro">LABEL · 12 · Rajdhani 600 · track 0.32</div></div>
  </div>
  <div class="row" style="align-items:baseline; gap:14px;">
    <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.18em; color:var(--fg-3); text-transform:uppercase; line-height:1;">MICRO READOUT</div>
    <div style="flex:1; padding-bottom:6px;"><div class="micro">MICRO · 10 · Share Tech Mono</div></div>
  </div>
</div>
</body></html>
