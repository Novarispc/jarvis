<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%23a8d8ff'/%3E%3Cstop offset='60%25' stop-color='%234ca8e8'/%3E%3Cstop offset='100%25' stop-color='%23001a33' stop-opacity='0'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='14' fill='url(%23g)'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23ffffff' opacity='0.9'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Full-screen orb canvas — sits behind everything -->
  <canvas id="orb-canvas"></canvas>

  <!-- HUD System Layout -->
  <div class="hud-system">

    <!-- Corner brackets (cosmetic) -->
    <div class="corner-bracket tl"></div>
    <div class="corner-bracket tr"></div>
    <div class="corner-bracket bl"></div>
    <div class="corner-bracket br"></div>

    <!-- ── Header ──────────────────────────────────────────────── -->
    <header class="hud-header">
      <div class="hud-wordmark">J.A.R.V.I.S.</div>
      <div class="hud-pills">
        <div class="hud-pill live">LIVE</div>
        <div class="hud-pill" id="hud-time">00:00:00</div>
        <div class="hud-pill" id="hud-date">--- -- ---</div>
      </div>
    </header>

    <!-- ── Left Panel ──────────────────────────────────────────── -->
    <aside class="hud-left">

      <!-- Quick Launch -->
      <div class="hud-panel">
        <div class="hud-panel-hdr">
          <span class="panel-dot-pulse"></span>
          <span class="panel-label">QUICK LAUNCH</span>
        </div>
        <div class="launcher-grid">
          <button class="hex-btn" data-cmd="Open Chrome"><span>CHR</span></button>
          <button class="hex-btn" data-cmd="Open Calculator"><span>CALC</span></button>
          <button class="hex-btn" data-cmd="Open File Explorer"><span>EXP</span></button>
          <button class="hex-btn" data-cmd="Open Terminal"><span>TERM</span></button>
          <button class="hex-btn" data-cmd="Open VS Code"><span>CODE</span></button>
          <button class="hex-btn" data-cmd="Open Notepad"><span>NOTE</span></button>
        </div>
      </div>

      <!-- Reactor Status -->
      <div class="hud-panel">
        <div class="hud-panel-hdr">
          <span class="panel-dot-pulse"></span>
          <span class="panel-label">REACTOR STATUS</span>
        </div>
        <div class="reactor-display">
          <div class="reactor-meta">
            <span id="reactor-online-text" class="reactor-online">● ONLINE</span>
            <span id="reactor-pct" class="reactor-pct">100%</span>
          </div>
          <svg id="reactor-svg" class="reactor-svg" viewBox="0 0 100 100">
            <!-- Outer rings -->
            <circle cx="50" cy="50" r="46" fill="none" stroke="var(--primary)" stroke-width="2" id="r-outer"/>
            <circle cx="50" cy="50" r="38" fill="none" stroke="var(--border-2)" stroke-width="1"/>
            <circle cx="50" cy="50" r="32" fill="none" stroke="var(--border-2)" stroke-width="1"/>
            <!-- Charging rings (stroke-dashoffset updated by JS) -->
            <circle cx="50" cy="50" r="28" fill="none" stroke="var(--primary)" stroke-width="2" id="r-ring1"
              style="stroke-dasharray:176; stroke-dashoffset:0; transform:rotate(-90deg); transform-origin:50% 50%;"/>
            <circle cx="50" cy="50" r="22" fill="none" stroke="var(--primary)" stroke-width="4" id="r-ring2"
              style="stroke-dasharray:138; stroke-dashoffset:0; transform:rotate(-90deg); transform-origin:50% 50%;"/>
            <circle cx="50" cy="50" r="16" fill="none" stroke="var(--primary)" stroke-width="2" id="r-ring3"
              style="stroke-dasharray:100; stroke-dashoffset:0; transform:rotate(90deg); transform-origin:50% 50%;"/>
            <!-- Spinning accent rings (visibility toggled by JS) -->
            <circle cx="50" cy="50" r="35" fill="none" stroke="var(--accent)" stroke-width="1.5" id="r-spin1"
              style="stroke-dasharray:30 190; transform-origin:50% 50%; animation:reactor-spin 1s linear infinite; opacity:0;"/>
            <circle cx="50" cy="50" r="30" fill="none" stroke="var(--primary)" stroke-width="1" id="r-spin2"
              style="stroke-dasharray:20 170; transform-origin:50% 50%; animation:reactor-spin 1.5s linear infinite reverse; opacity:0;"/>
            <!-- Crosshairs -->
            <line x1="2"  y1="50" x2="14" y2="50" stroke="var(--primary)" stroke-width="1" id="r-cross"/>
            <line x1="86" y1="50" x2="98" y2="50" stroke="var(--primary)" stroke-width="1" id="r-cross2"/>
            <line x1="50" y1="2"  x2="50" y2="14" stroke="var(--primary)" stroke-width="1" id="r-cross3"/>
            <line x1="50" y1="86" x2="50" y2="98" stroke="var(--primary)" stroke-width="1" id="r-cross4"/>
            <!-- Core -->
            <circle cx="50" cy="50" r="14" fill="var(--primary)" opacity="0.1" id="r-core-fill"/>
            <circle cx="50" cy="50" r="14" fill="none" stroke="var(--primary)" stroke-width="2"/>
            <circle cx="50" cy="50" r="8" fill="var(--primary)" id="r-core"
              style="filter:drop-shadow(0 0 8px var(--primary-glow)); animation:reactor-pulse 1.2s ease-in-out infinite;"/>
            <circle cx="50" cy="50" r="4" fill="white" id="r-center"
              style="filter:drop-shadow(0 0 12px var(--primary-glow));"/>
          </svg>
        </div>
      </div>

    </aside>

    <!-- ── Center Display (transparent — orb canvas shows through) ── -->
    <main class="hud-center">
      <div id="greeting-text" class="greeting-text">
        GOOD EVENING, SIR · <span class="greeting-hl">HOW MAY I ASSIST</span>
      </div>
      <div id="orb-state-label" class="orb-state-label"></div>
    </main>

    <!-- ── Right Panel ─────────────────────────────────────────── -->
    <aside class="hud-right">

      <!-- System Telemetry -->
      <div class="hud-panel">
        <div class="hud-panel-hdr">
          <span class="panel-dot-pulse"></span>
          <span class="panel-label">SYSTEM TELEMETRY</span>
        </div>
        <div class="gauges-row">
          <!-- CPU -->
          <div class="gauge">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="46" fill="none" stroke="var(--border-1)" stroke-width="1"/>
              <circle cx="50" cy="50" r="40" fill="none" stroke="var(--border-1)" stroke-width="1"/>
              <circle cx="50" cy="50" r="36" fill="none" stroke="var(--primary)" stroke-width="6" id="gauge-cpu-arc"
                style="stroke-dasharray:152 226; stroke-dashoffset:-76; transform:rotate(-90deg); transform-origin:50% 50%; filter:drop-shadow(0 0 6px var(--primary-glow));"/>
              <circle cx="50" cy="50" r="2" fill="var(--primary)"/>
            </svg>
            <div class="gauge-center">
              <div class="gauge-val" id="cpu-val">67</div>
              <div class="gauge-unit">CPU %</div>
            </div>
          </div>
          <!-- GPU -->
          <div class="gauge">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="46" fill="none" stroke="var(--border-1)" stroke-width="1"/>
              <path d="M50 50 L 50 4 A46 46 0 0 1 96 50 Z" fill="var(--accent)" opacity="0.7"/>
              <path d="M50 50 L 96 50 A46 46 0 0 1 50 96 Z" fill="var(--accent)" opacity="0.45"/>
              <circle cx="50" cy="50" r="32" fill="var(--surface-1)"/>
              <circle cx="50" cy="50" r="32" fill="none" stroke="var(--primary)" stroke-width="2"/>
              <circle cx="50" cy="50" r="20" fill="none" stroke="var(--border-1)" stroke-width="1"/>
              <circle cx="50" cy="50" r="3" fill="var(--accent)"/>
            </svg>
            <div class="gauge-center">
              <div class="gauge-val accent-val" id="gpu-val">82</div>
              <div class="gauge-unit accent-val">GPU %</div>
            </div>
          </div>
        </div>

        <div class="hud-bars">
          <div class="hud-bar-row">
            <span class="hud-bar-label">MEMORY</span>
            <div class="hud-bar"><div class="hud-bar-fill" id="bar-memory" style="width:73%"></div></div>
            <span class="hud-bar-val" id="val-memory">73%</span>
          </div>
          <div class="hud-bar-row">
            <span class="hud-bar-label">DISK</span>
            <div class="hud-bar"><div class="hud-bar-fill warn" id="bar-disk" style="width:48%"></div></div>
            <span class="hud-bar-val warn" id="val-disk">48 GB</span>
          </div>
          <div class="hud-bar-row">
            <span class="hud-bar-label">SIGNAL</span>
            <div class="hud-bar"><div class="hud-bar-fill" id="bar-signal" style="width:91%"></div></div>
            <span class="hud-bar-val" id="val-signal">91%</span>
          </div>
        </div>
      </div>

      <!-- Power Distribution -->
      <div class="hud-panel">
        <div class="hud-panel-hdr">
          <span class="panel-dot-pulse"></span>
          <span class="panel-label">POWER DISTRIBUTION</span>
        </div>
        <div class="gauges-row">
          <div class="gauge">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="40" fill="none" stroke="var(--border-1)" stroke-width="1"/>
              <circle cx="50" cy="50" r="30" fill="none" stroke="var(--primary)" stroke-width="4"
                style="stroke-dasharray:125 188; stroke-dashoffset:-50; transform:rotate(-90deg); transform-origin:50% 50%; filter:drop-shadow(0 0 4px var(--primary-glow));"/>
            </svg>
            <div class="gauge-center">
              <div class="gauge-val">78</div>
              <div class="gauge-unit">CORE</div>
            </div>
          </div>
          <div class="gauge">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="40" fill="none" stroke="var(--border-1)" stroke-width="1"/>
              <circle cx="50" cy="50" r="30" fill="none" stroke="var(--accent)" stroke-width="4"
                style="stroke-dasharray:100 188; stroke-dashoffset:-70; transform:rotate(-90deg); transform-origin:50% 50%; filter:drop-shadow(0 0 4px var(--accent-glow));"/>
            </svg>
            <div class="gauge-center">
              <div class="gauge-val accent-val">54</div>
              <div class="gauge-unit accent-val">AUX</div>
            </div>
          </div>
        </div>
      </div>

    </aside>

    <!-- ── Footer ──────────────────────────────────────────────── -->
    <footer class="hud-footer">
      <div class="hud-diagnostics">
        <div class="diag-item">
          <div class="diag-label">UPTIME</div>
          <div class="diag-value" id="diag-uptime">0D 0H 0M</div>
        </div>
        <div class="diag-item">
          <div class="diag-label">CORE TEMP</div>
          <div class="diag-value">54°C</div>
        </div>
        <div class="diag-item">
          <div class="diag-label">NETWORK</div>
          <div class="diag-value" id="diag-network">OPTIMAL</div>
        </div>
        <div class="diag-item">
          <div class="diag-label">PROTOCOL</div>
          <div class="diag-value">v0.1.0</div>
        </div>
      </div>

      <div class="voice-controls">
        <!-- Existing mic button — keep SVG unchanged -->
        <button id="btn-mute" class="voice-btn" title="Mute / Unmute">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
          </svg>
        </button>
        <button id="btn-menu" class="voice-btn" title="Menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
          </svg>
        </button>
      </div>
    </footer>

  </div><!-- /hud-system -->

  <!-- Menu dropdown — above HUD, anchored bottom-right -->
  <div id="menu-dropdown" style="display:none">
    <button id="btn-settings">Settings</button>
    <button id="btn-restart">Restart Server</button>
    <button id="btn-fix-self">Fix Yourself</button>
  </div>

  <!-- Error toast — absolute over HUD -->
  <div id="error-text"></div>

  <!-- Hidden compat divs — main.ts still queries these -->
  <div id="status-text" style="display:none"></div>
  <div id="jarvis-label" style="display:none"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
